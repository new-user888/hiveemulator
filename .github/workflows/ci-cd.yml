name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - production

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository }}/communication-control
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/map-client

jobs:
  build-api:
    name: Build & Test API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/CommunicationControl/DevOpsProject/DevOpsProject.CommunicationControl.API.csproj

      - name: Build
        run: dotnet build src/CommunicationControl/DevOpsProject/DevOpsProject.CommunicationControl.API.csproj --no-restore -c Release

      - name: Publish
        run: dotnet publish src/CommunicationControl/DevOpsProject/DevOpsProject.CommunicationControl.API.csproj -c Release -o src/CommunicationControl/published

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-published
          path: src/CommunicationControl/published/

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd src/MapClient
          npm ci

      - name: Build
        run: |
          cd src/MapClient
          npm run build

      - name: Upload Frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/MapClient/dist/

  docker-api:
    name: Docker API Image
    runs-on: ubuntu-latest
    needs: build-api
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-published
          path: src/CommunicationControl/published/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "tag=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build and push API image
        run: |
          cd src/CommunicationControl
          docker build -t ${{ env.API_IMAGE }}:${{ steps.tag.outputs.tag }} -t ${{ env.API_IMAGE }}:latest .
          docker push ${{ env.API_IMAGE }}:${{ steps.tag.outputs.tag }}
          docker push ${{ env.API_IMAGE }}:latest

  docker-frontend:
    name: Docker Frontend Image
    runs-on: ubuntu-latest
    needs: build-frontend
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: src/MapClient/dist/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "tag=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build and push Frontend image
        run: |
          cd src/MapClient
          docker build -t ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.tag }} -t ${{ env.FRONTEND_IMAGE }}:latest .
          docker push ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.tag }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest

  deploy-dev:
    name: Deploy to DEV (manual)
    runs-on: ubuntu-latest
    needs: [docker-api, docker-frontend]
    if: github.ref == 'refs/heads/dev' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Deploy to DEV server
        run: |
          echo "${{ secrets.CERTIFICATE_AUTHORITY_DATA }}" | base64 -d > /tmp/ca.crt
          kubectl config set-cluster github-cluster --server=${{ secrets.DEV_KUB_SERVER }} --certificate-authority=/tmp/ca.crt --embed-certs=true
          kubectl config set-credentials github-user --token=${{ secrets.DEV_KUB_USER_TOKEN }}
          kubectl config set-context github-context --cluster=github-cluster --user=github-user
          kubectl config use-context github-context

          kubectl set image deployment/com-control com-control=${{ env.API_IMAGE }}:1.0.${{ github.run_number }}
          kubectl set image deployment/map-client map-client=${{ env.FRONTEND_IMAGE }}:1.0.${{ github.run_number }}

  deploy-production:
    name: Deploy to PRODUCTION (manual)
    runs-on: ubuntu-latest
    needs: [docker-api, docker-frontend]
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Deploy to PRODUCTION server
        run: |
          echo "${{ secrets.CERTIFICATE_AUTHORITY_DATA }}" | base64 -d > /tmp/ca.crt
          kubectl config set-cluster github-cluster --server=${{ secrets.PROD_KUB_SERVER }} --certificate-authority=/tmp/ca.crt --embed-certs=true
          kubectl config set-credentials github-user --token=${{ secrets.PROD_KUB_USER_TOKEN }}
          kubectl config set-context github-context --cluster=github-cluster --user=github-user
          kubectl config use-context github-context

          kubectl set image deployment/com-control com-control=${{ env.API_IMAGE }}:1.0.${{ github.run_number }}
          kubectl set image deployment/map-client map-client=${{ env.FRONTEND_IMAGE }}:1.0.${{ github.run_number }}
